<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日上朝 - 搞笑日常记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap');
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFB6C1 0%, #B0C4DE 50%, #98FB98 100%);
            min-height: 100vh;
        }

        .activity-item {
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .completed {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .checkbox {
            transition: all 0.3s ease;
        }

        .checkbox.completed {
            background: #10b981;
            border-color: #10b981;
        }

        .mascot {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .progress-bar {
            transition: width 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <!-- 标题栏 -->
            <header class="text-center mb-8 space-y-4">
                <h1 class="text-4xl md:text-6xl font-bold text-gray-800">
                    今日上朝 👑
                </h1>
                <p class="text-lg md:text-xl text-gray-600">
                    皇上，今日您过得如何？
                </p>

                <!-- 今日状态 -->
                <div class="inline-flex items-center space-x-4 bg-white/80 backdrop-blur-sm rounded-2xl px-6 py-3 shadow-lg">
                    <span class="text-2xl" id="statusEmoji">😴</span>
                    <div class="text-left">
                        <div class="font-bold text-gray-700" id="statusTitle">普通废物</div>
                        <div class="text-sm text-gray-600" id="statusMessage">中规中矩的废物水平</div>
                    </div>
                </div>
            </header>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- 吉祥物和统计 -->
                <div class="lg:col-span-1 space-y-6">
                    <!-- 吉祥物 -->
                    <div class="bg-white/80 backdrop-blur-sm rounded-3xl p-6 shadow-lg text-center">
                        <div class="mascot text-8xl mb-4" id="mascot">🐼</div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">熊猫君</h3>
                        <p class="text-gray-600 mb-4" id="mascotMessage">今天要努力完成任务哦！</p>
                        <button onclick="petMascot()" class="px-4 py-2 bg-pink-100 text-pink-700 rounded-full text-sm hover:bg-pink-200 transition-colors">
                            点击抚摸 💕
                        </button>
                    </div>

                    <!-- 统计数据 -->
                    <div class="bg-white/80 backdrop-blur-sm rounded-3xl p-6 shadow-lg">
                        <h3 class="text-xl font-bold text-gray-800 text-center mb-4">📊 今日数据</h3>

                        <div class="grid grid-cols-2 gap-4 text-center mb-4">
                            <div>
                                <div class="text-2xl font-bold text-green-600" id="completedCount">0</div>
                                <div class="text-sm text-gray-600">已完成</div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-blue-600">5</div>
                                <div class="text-sm text-gray-600">总任务</div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-purple-600" id="completionRate">0%</div>
                                <div class="text-sm text-gray-600">完成率</div>
                            </div>
                            <div>
                                <div class="text-2xl font-bold text-orange-600">0</div>
                                <div class="text-sm text-gray-600">连击</div>
                            </div>
                        </div>

                        <!-- 进度条 -->
                        <div class="w-full bg-gray-200 rounded-full h-3 mb-2">
                            <div class="progress-bar h-full bg-gradient-to-r from-green-400 to-green-600 rounded-full" style="width: 0%" id="progressBar"></div>
                        </div>
                        <div class="text-center text-sm text-gray-600">今日进度</div>
                    </div>
                </div>

                <!-- 任务清单 -->
                <div class="lg:col-span-2">
                    <div class="bg-white/80 backdrop-blur-sm rounded-3xl p-6 shadow-lg">
                        <h2 class="text-3xl font-bold text-gray-800 text-center mb-6">
                            今日清单 📋
                        </h2>

                        <div class="space-y-4" id="activityList">
                            <!-- 活动项将由JavaScript生成 -->
                        </div>

                        <!-- 全部完成庆祝 -->
                        <div class="hidden mt-6 p-4 bg-yellow-100 rounded-2xl text-center" id="celebrationMessage">
                            <div class="text-4xl mb-2">🎉</div>
                            <p class="text-yellow-800 font-bold">恭喜！今日所有沙雕任务完成！</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部信息 -->
            <footer class="mt-12 text-center text-gray-500 space-y-2">
                <div class="text-sm" id="currentDate"></div>
                <div class="text-xs">🎌 愿你每天都能成功上朝，做个快乐的废物</div>
            </footer>
        </div>
    </div>

    <script>
        // 活动数据
        const activities = [
            { id: 'poop', text: '今天成功拉屎了吗？', emoji: '💩', description: '人类基本生存技能检测' },
            { id: 'shower', text: '今天洗澡了吗？', emoji: '🛁', description: '防止变成行走的生化武器' },
            { id: 'coffee', text: '喝了几杯咖啡续命？', emoji: '☕', description: '咖啡因中毒预警系统' },
            { id: 'slack', text: '今天摸鱼了吗？', emoji: '🐟', description: '不摸鱼的社畜不是好社畜' },
            { id: 'phone', text: '刷手机超过8小时了吗？', emoji: '📱', description: '现代人指纹磨损检测' }
        ];

        let completedActivities = {};
        let petCount = 0;

        // 初始化
        function init() {
            renderActivities();
            updateStats();
            updateDate();

            // 从localStorage加载数据
            const saved = localStorage.getItem('jinrishangchao_today');
            if (saved) {
                completedActivities = JSON.parse(saved);
                renderActivities();
                updateStats();
            }
        }

        // 渲染活动列表
        function renderActivities() {
            const container = document.getElementById('activityList');
            container.innerHTML = '';

            activities.forEach(activity => {
                const completed = completedActivities[activity.id] || false;
                const div = document.createElement('div');
                div.className = `activity-item flex items-center justify-between p-4 rounded-2xl cursor-pointer ${
                    completed ? 'completed' : 'bg-gray-50 hover:bg-gray-100'
                }`;

                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="text-3xl">${activity.emoji}</span>
                        <div>
                            <div class="text-lg font-bold ${completed ? 'text-white' : 'text-gray-800'}">${activity.text}</div>
                            <div class="text-sm ${completed ? 'text-green-100' : 'text-gray-500'}">${activity.description}</div>
                        </div>
                    </div>
                    <div class="checkbox w-8 h-8 border-2 rounded-full flex items-center justify-center ${
                        completed ? 'completed' : 'border-gray-300 hover:border-green-400'
                    }">
                        ${completed ? '✓' : ''}
                    </div>
                `;

                div.onclick = () => toggleActivity(activity.id);
                container.appendChild(div);
            });
        }

        // 切换活动状态
        function toggleActivity(activityId) {
            completedActivities[activityId] = !completedActivities[activityId];

            // 保存到localStorage
            localStorage.setItem('jinrishangchao_today', JSON.stringify(completedActivities));

            renderActivities();
            updateStats();

            // 庆祝效果
            if (completedActivities[activityId]) {
                showCelebration();
            }
        }

        // 更新统计
        function updateStats() {
            const completed = Object.values(completedActivities).filter(Boolean).length;
            const total = activities.length;
            const rate = total > 0 ? completed / total : 0;

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('completionRate').textContent = Math.round(rate * 100) + '%';
            document.getElementById('progressBar').style.width = (rate * 100) + '%';

            updateStatus(rate);
            updateMascot(rate);

            // 全部完成庆祝
            const celebration = document.getElementById('celebrationMessage');
            if (rate === 1 && total > 0) {
                celebration.classList.remove('hidden');
            } else {
                celebration.classList.add('hidden');
            }
        }

        // 更新状态
        function updateStatus(rate) {
            let status;
            if (rate === 1) {
                status = { emoji: '🏆', title: '今日圣人', message: '哇！你今天表现得像个正常人！' };
            } else if (rate >= 0.7) {
                status = { emoji: '😊', title: '合格人类', message: '不错！至少证明了你还活着' };
            } else if (rate >= 0.5) {
                status = { emoji: '😐', title: '普通废物', message: '中规中矩的废物水平' };
            } else if (rate >= 0.3) {
                status = { emoji: '😅', title: '进阶废物', message: '今天的废物指数有点高啊' };
            } else {
                status = { emoji: '💀', title: '超级废物', message: '恭喜！你已达到废物的巅峰' };
            }

            document.getElementById('statusEmoji').textContent = status.emoji;
            document.getElementById('statusTitle').textContent = status.title;
            document.getElementById('statusMessage').textContent = status.message;
        }

        // 更新吉祥物
        function updateMascot(rate) {
            let message;
            if (rate === 1) {
                message = '哇！你今天太棒了！👑';
            } else if (rate >= 0.7) {
                message = '表现很不错哦！继续加油！';
            } else if (rate >= 0.5) {
                message = '今天过得还不错呢～';
            } else if (rate >= 0.3) {
                message = '今天普普通通，也没关系';
            } else {
                message = '要不要休息一下？';
            }

            document.getElementById('mascotMessage').textContent = message;
        }

        // 抚摸吉祥物
        function petMascot() {
            petCount++;
            const mascot = document.getElementById('mascot');
            const message = document.getElementById('mascotMessage');

            mascot.style.transform = 'scale(1.2)';
            setTimeout(() => {
                mascot.style.transform = 'scale(1)';
            }, 200);

            const messages = [
                '好开心！再摸摸我！',
                '哇，好舒服～',
                '我喜欢你！',
                '嘿嘿，痒痒的',
                '你的手好温暖'
            ];

            message.textContent = messages[Math.floor(Math.random() * messages.length)];
        }

        // 庆祝效果
        function showCelebration() {
            // 简单的庆祝效果
            document.body.style.background = 'linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FF69B4 100%)';
            setTimeout(() => {
                document.body.style.background = 'linear-gradient(135deg, #FFB6C1 0%, #B0C4DE 50%, #98FB98 100%)';
            }, 1000);
        }

        // 更新日期
        function updateDate() {
            const now = new Date();
            const dateString = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            document.getElementById('currentDate').textContent = `今天是 ${dateString}`;
        }

        // 页面加载时初始化
        init();
    </script>
</body>
</html>
